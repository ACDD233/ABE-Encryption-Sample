spring.application.name=clouddisk

# MariaDB Connection Configuration
# In production, these should be provided via environment variables (see docker-compose.yml)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/abe_cloud_disk?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath:/mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Multipart configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# File storage configuration
# The path used inside the container. Overridden by environment variable in docker-compose.
file.upload-dir=${UPLOAD_DIR:uploads}

# JWT Configuration
# A random key will be generated if not provided (see JwtUtil.java)
jwt.secret=${JWT_SECRET:}
